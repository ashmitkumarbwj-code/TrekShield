name: Build and Deploy Android APK

on:
  push:
      branches: [ "main" ]
          paths:
                - 'Him-Trek-Guide/TrekSafetyApp/**'
                  workflow_dispatch:

                  jobs:
                    build:
                        runs-on: ubuntu-latest

                                steps:
                                    - uses: actions/checkout@v3

                                        - name: set up JDK 17
                                              uses: actions/setup-java@v3
                                                    with:
                                                            java-version: '17'
                                                                    distribution: 'temurin'
                                                                            cache: gradle

                                                                                - name: Grant execute permission for gradlew
                                                                                      run: chmod +x Him-Trek-Guide/TrekSafetyApp/gradlew || true

                                                                                          - name: Build with Gradle
                                                                                                working-directory: Him-Trek-Guide/TrekSafetyApp
                                                                                                      run: gradle assembleDebug
                                                                                                      
                                                                                                          - name: Copy APK to Website Folder
                                                                                                                run: |
                                                                                                                        cp Him-Trek-Guide/TrekSafetyApp/app/build/outputs/apk/debug/app-debug.apk Him-Trek-Guide/trekshield-website/TrekShield.apk
                                                                                                                        
                                                                                                                            - name: Commit and Push APK
                                                                                                                                  run: |
                                                                                                                                          git config --global user.name "github-actions[bot]"
                                                                                                                                                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                          git add Him-Trek-Guide/trekshield-website/TrekShield.apk
                                                                                                                                                                  # Only commit if there are changes
                                                                                                                                                                          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Auto-generate latest APK [skip ci]"
                                                                                                                                                                                  git push
                                                                                                                                                                                  
